<!DOCTYPE html>
<html lang="de">
<head>

  <header>

  <main class="gallery">
    <!-- Pixel -->

        <h3>Pixel-Based</h3>

    <a href="works/vectorbased.html" class="art-card">

        <p>Click to see more</p>
      </div>
    </div>

    <a href="works/other.html" class="art-card">

      <img src="images/Posterrr.png" alt="Artwork 3">
