<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vector Art</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }
   </style>
  <link rel="stylesheet"  href="../styles/design.css">
</head>
<body>

  <header>
    <a href="../index.html">
  <img src="../images/BackButton.png" alt="Back to Gallery">
    </a>
  </header>

  <main class="artwork-page">

    <img src="../images/TaubenFinall.jpg" alt="Artwork Title" class="artwork-image">

    
    <div class="artwork-details">
      <h1>VectorArt - Tauben</h1>

      <p><strong>Kurs:</strong> Blockseminar 2026</p>
      <p><strong>Illustration:</strong> Tauben im Park</p>

      <p class="description">
        Klicke auf die Buttons um meinen Prozess zu sehen
      </p>
    </div>

    <div class="slideshow">
    <img src="../images/Tauben1.jpg" class="slide active" alt="Artwork 1">
    <img src="../images/Tauben2.jpg" class="slide" alt="Artwork 2">
    <img src="../images/Tauben3.jpg" class="slide" alt="Artwork 3">
    <img src="../images/Tauben4.jpg" class="slide" alt="Artwork 4">
    <img src="../images/Tauben5.jpg" class="slide" alt="Artwork 5">
    <img src="../images/Tauben6.jpg" class="slide" alt="Artwork 6">
    <img src="../images/Tauben7.jpg" class="slide" alt="Artwork 7">
    <img src="../images/Tauben8.jpg" class="slide" alt="Artwork 8">
    <img src="../images/Tauben9.jpg" class="slide" alt="Artwork 9">
    <img src="../images/Tauben10.jpg" class="slide" alt="Artwork 10">
  
    <button id="prev">Prev</button>
    <button id="next">Next </button>
    </div>

  </main>
<script src="../js/script.js"></script>
</body>
</html>
